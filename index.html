<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name">
            <button onclick="searchWeather()">Search</button>
        </div>
        <div class="weather-card">
            <div class="location">
                <h2 id="city">City</h2>
                <p id="region">Region, Country</p>
            </div>
            <div class="temperature">
                <h1 id="temp">--°C</h1>
            </div>
            <div class="condition">
                <img id="icon" src="" alt="">
                <span id="condition-text">Condition</span>
            </div>
            <div class="weather-info">
                <div class="info-box">
                    <h4>Feels Like</h4>
                    <p id="feels-like">--°C</p>
                </div>
                <div class="info-box">
                    <h4>Humidity</h4>
                    <p id="humidity">--%</p>
                </div>
                <div class="info-box">
                    <h4>Wind</h4>
                    <p id="wind">-- km/h</p>
                </div>
                <div class="info-box">
                    <h4>Visibility</h4>
                    <p id="visibility">-- km</p>
                </div>
                <div class="info-box">
                    <h4>Pressure</h4>
                    <p id="pressure">-- mb</p>
                </div>
                <div class="info-box">
                    <h4>Heat Index</h4>
                    <p id="heat-index">--°C</p>
                </div>
            </div>
        </div>
    </div>
    <script src="weather.js"></script>
</body>
</html>
